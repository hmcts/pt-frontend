nodejs:
  applicationPort: 4000
  aadIdentityName: pt
  ingressHost: pt-frontend.{{ .Values.global.environment }}.platform.hmcts.net
  image: 'hmctsprod.azurecr.io/pt/frontend:latest'
    keyVaults:
      pt-kv:
        secrets:
          - AppInsightsInstrumentationKey
          - redis-connection-string
  environment:
    REDIS_TTL: 6000
    REDIS_SESSION_PREFIX: 'pcs'
